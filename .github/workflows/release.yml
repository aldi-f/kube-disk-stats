name: Release

on:
  push:
    tags:
    - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
      create_tag:
        description: 'Create tag if it does not exist'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  GO_VERSION: '1.23'

jobs:
  create-tag:
    name: Create Tag
    if: github.event_name == 'workflow_dispatch' && inputs.create_tag == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Create and push tag
      run: |
        git tag -a ${{ inputs.tag }} -m "Release ${{ inputs.tag }}"
        git push origin ${{ inputs.tag }}

  release:
    name: Create Release
    needs: [ create-tag ]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Generate release notes
      id: release_notes
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TAG=${{ inputs.tag }}
        fi

        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

        if [ -n "$PREV_TAG" ]; then
          echo "# Release $TAG" > release_notes.md
          echo "" >> release_notes.md
          echo "## Changes since $PREV_TAG" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
        else
          echo "# Release $TAG" > release_notes.md
          echo "Initial release" >> release_notes.md
        fi

        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release_notes.outputs.tag }}
        name: Release ${{ steps.release_notes.outputs.tag }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        generate_release_notes: true

  build-release-artifacts:
    name: Build Release Binaries
    needs: [ release ]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [ linux, darwin, windows ]
        goarch: [ amd64, arm64 ]
        exclude:
        - goos: windows
          goarch: arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Download dependencies
      working-directory: ./cli
      run: go mod download

    - name: Build binary
      working-directory: ./cli
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TAG=${{ inputs.tag }}
        fi

        OUTPUT_NAME="kube-disk-stats-${{ matrix.goos }}-${{ matrix.goarch }}"
        if [ "${{ matrix.goos }}" = "windows" ]; then
          OUTPUT_NAME="${OUTPUT_NAME}.exe"
        fi

        go build -ldflags="-s -w -X main.Version=${TAG}" -o "dist/${OUTPUT_NAME}" .
        cd dist
        tar -czf "${OUTPUT_NAME}.tar.gz" "${OUTPUT_NAME}"

        if [ "${{ matrix.goos }}" = "windows" ]; then
          zip -r "${OUTPUT_NAME}.zip" "${OUTPUT_NAME}.exe"
        else
          zip -r "${OUTPUT_NAME}.zip" "${OUTPUT_NAME}"
        fi

    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          kube-disk-stats/dist/*.tar.gz
          kube-disk-stats/dist/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-docker:
    name: Build and Push Docker Images
    needs: [ release ]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          yourusername/kube-disk-stats
          ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha

    - name: Build and push Docker images
      uses: docker/build-push-action@v5
      with:
        context: ./cli
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max
